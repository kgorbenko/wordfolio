name: Frontend CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Wordfolio.Frontend/**'
      - 'api/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    defaults:
      run:
        working-directory: Wordfolio.Frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Wordfolio.Frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci

    - name: Check API schema freshness
      run: |
        npm run generate:api
        if ! git diff --exit-code src/shared/api/generated/schema.d.ts; then
          echo "schema.d.ts is out of date. Run 'npm run generate:api' and commit the result."
          exit 1
        fi

    - name: Check formatting
      run: npm run format:check
    
    - name: Run linter
      run: npm run lint
    
    - name: Run tests
      run: npm test
    
    - name: Build
      run: npm run build
